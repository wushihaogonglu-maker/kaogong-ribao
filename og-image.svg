<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Thin decorative line -->
  <line x1="300" y1="200" x2="900" y2="200" stroke="#444" stroke-width="1"/>

  <!-- Main title -->
  <text x="600" y="280" text-anchor="middle" font-size="72" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" fill="#f5f4f1" font-weight="300" letter-spacing="20">考 公 补 给 站</text>

  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" font-size="28" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" fill="#999" font-weight="300" letter-spacing="8">每日公考学习 · 成语 · 实词 · 常识 · 时政</text>

  <!-- Bottom line -->
  <text x="600" y="480" text-anchor="middle" font-size="22" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" fill="#666" font-weight="300" letter-spacing="6">日拱一卒，功不唐捐</text>
</svg>
