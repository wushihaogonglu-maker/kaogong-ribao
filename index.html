<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考公补给站</title>
<style>
/* ===========================================
   考公补给站 — Minimal Premium
   Inspired by precision, not decoration
   =========================================== */

:root {
  --ink:        #1a1a1a;
  --ink-light:  #666666;
  --ink-muted:  #999999;
  --surface:    #ffffff;
  --bg:         #f5f4f1;
  --bg-subtle:  #f0efec;
  --border:     #e8e8e6;
  --border-light:#f0f0ee;
  --accent:     #1a1a1a;
  --danger:     #d94a4a;

  --radius:     6px;
  --font:       "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 15px; height: 100%; -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font);
  color: var(--ink);
  background: var(--bg);
  line-height: 1.6;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===========================================
   View System
   =========================================== */

.view {
  position: fixed;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.35s ease, visibility 0.35s;
  -webkit-overflow-scrolling: touch;
}

.view-visible {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

/* ===========================================
   LANDING — Dark Cinematic
   =========================================== */

.view-landing {
  background: #1a1a1a;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
}

.landing {
  text-align: center;
  padding: 48px 24px;
}

.landing-badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  margin-bottom: 32px;
}

.landing-logo {
  font-size: 2.4rem;
  font-weight: 300;
  letter-spacing: 0.2em;
  line-height: 1.4;
  color: #fff;
}

.landing-line {
  width: 1px;
  height: 48px;
  background: rgba(255,255,255,0.15);
  margin: 36px auto;
}

.landing-streak {
  font-size: 0.82rem;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.04em;
  margin-bottom: 40px;
}

.landing-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 14px 48px;
  font-family: var(--font);
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: #1a1a1a;
  background: #fff;
  border: none;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.landing-btn:active {
  background: #e0e0e0;
  transform: scale(0.98);
}

.landing-meta {
  margin-top: 40px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.04em;
}

/* ===========================================
   HUB — Clean White
   =========================================== */

.view-hub {
  background: var(--bg);
}

.hub {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
  padding: 48px 24px;
}

.hub-label {
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 8px;
}

.hub-title {
  font-size: 1.4rem;
  font-weight: 300;
  letter-spacing: 0.06em;
  color: var(--ink);
}

.hub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  max-width: 500px;
  width: 100%;
  margin-top: 40px;
  background: var(--border);
  border: 1px solid var(--border);
}

.hub-card {
  background: var(--surface);
  padding: 36px 28px 32px;
  cursor: pointer;
  text-align: center;
  transition: background 0.2s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.hub-card:active {
  background: var(--bg-subtle);
}

.hub-card-icon {
  font-size: 1.6rem;
  display: block;
  margin-bottom: 12px;
  opacity: 0.8;
}

.hub-card-label {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.04em;
}

.hub-card-desc {
  font-size: 0.7rem;
  color: var(--ink-muted);
  margin-top: 4px;
}

.hub-back {
  margin-top: 36px;
}

.hub-back-link {
  background: none;
  border: none;
  font-size: 0.78rem;
  color: var(--ink-muted);
  cursor: pointer;
  font-family: var(--font);
  letter-spacing: 0.04em;
  padding: 8px 16px;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.hub-back-link:active { color: var(--ink); }

/* ===========================================
   CONTENT
   =========================================== */

.view-content {
  background: var(--bg);
}

.content-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 20px 100px;
}

/* Top bar */
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  font-size: 0.82rem;
  color: var(--ink-muted);
  cursor: pointer;
  padding: 4px 0;
  font-family: var(--font);
  letter-spacing: 0.04em;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
}

.back-btn:active { color: var(--ink); }

.topbar-title {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.04em;
}

.topbar-date {
  font-size: 0.72rem;
  color: var(--ink-muted);
}

/* Sections */
.section-label {
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.section-title {
  font-size: 1.1rem;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: 0.04em;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.section-title .count {
  font-size: 0.72rem;
  font-weight: 400;
  color: var(--ink-muted);
}

.section { margin-bottom: 40px; }

/* Idiom grid */
.idiom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.idiom-card {
  background: var(--surface);
  padding: 20px 18px;
  transition: background 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.idiom-word {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 4px;
}

.idiom-explain {
  font-size: 0.78rem;
  color: var(--ink-light);
  line-height: 1.65;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.idiom-focus {
  display: inline-block;
  font-size: 0.68rem;
  color: var(--ink-muted);
  background: var(--bg-subtle);
  padding: 2px 8px;
  margin-top: 8px;
  letter-spacing: 0.04em;
}

/* Knowledge */
.knowledge-list {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.knowledge-card {
  background: var(--surface);
  padding: 22px 20px;
}

.k-tag {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--ink-muted);
  margin-bottom: 8px;
}

.k-title {
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.5;
}

.k-body {
  font-size: 0.8rem;
  color: var(--ink-light);
  line-height: 1.7;
}

.exam-point {
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--bg-subtle);
  font-size: 0.76rem;
  color: var(--ink-light);
  line-height: 1.6;
  border-left: 2px solid var(--ink);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}

.empty-icon {
  font-size: 2rem;
  display: block;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-text {
  font-size: 0.88rem;
  color: var(--ink);
  font-weight: 500;
}

.empty-hint {
  font-size: 0.76rem;
  color: var(--ink-muted);
  margin-top: 6px;
}

/* Bottom nav */
.bottombar {
  position: sticky;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 12px 0;
  margin-top: 40px;
  background: var(--bg);
  border-top: 1px solid var(--border);
}

.nav-btn {
  background: none;
  border: none;
  padding: 8px 14px;
  font-size: 0.8rem;
  color: var(--ink-muted);
  cursor: pointer;
  font-family: var(--font);
  letter-spacing: 0.04em;
  min-height: 44px;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.nav-btn:active { color: var(--ink); }

.nav-select {
  background: none;
  border: none;
  padding: 8px 4px;
  font-size: 0.8rem;
  color: var(--ink-muted);
  cursor: pointer;
  min-height: 44px;
  font-family: var(--font);
  letter-spacing: 0.04em;
}

.nav-today {
  color: var(--ink);
  font-weight: 600;
}

/* Loading / Footer */
.loading { text-align: center; color: var(--ink-muted); padding: 60px 0; font-size: 0.82rem; }
.site-footer { text-align: center; color: var(--ink-muted); font-size: 0.68rem; padding: 24px 0 8px; border-top: 1px solid var(--border); margin-top: 24px; letter-spacing: 0.04em; }

/* ===========================================
   Responsive
   =========================================== */

@media (max-width: 480px) {
  .idiom-grid { grid-template-columns: 1fr; }
  .landing-logo { font-size: 1.8rem; }
  .landing-btn { padding: 12px 36px; font-size: 0.82rem; }
  .hub-grid { max-width: 100%; }
  .hub-card { padding: 28px 18px 24px; }
  .content-wrap { padding: 0 14px 80px; }
}
</style>
</head>
<body>

<!-- VIEW 1: LANDING -->
<div class="view view-landing view-visible" id="landingView">
  <div class="landing">
    <div class="landing-badge">Daily Supply</div>
    <h1 class="landing-logo">考 公 补 给 站</h1>
    <div class="landing-line"></div>
    <div class="landing-streak" id="landingStreak">已坚持 — 天</div>
    <button class="landing-btn" onclick="goToHub()">开始今天的学习</button>
    <div class="landing-meta">
      <span id="landingDate">—</span> · <span id="landingQuote"></span>
    </div>
  </div>
</div>

<!-- VIEW 2: HUB -->
<div class="view view-hub" id="hubView">
  <div class="hub">
    <div class="hub-label">Today's Study</div>
    <h2 class="hub-title">今日学习</h2>

    <div class="hub-grid">
      <div class="hub-card" onclick="openContent('idioms')">
        <span class="hub-card-icon">一</span>
        <div class="hub-card-label">成语</div>
        <div class="hub-card-desc">每日积累</div>
      </div>
      <div class="hub-card" onclick="openContent('vocab')">
        <span class="hub-card-icon">字</span>
        <div class="hub-card-label">实词</div>
        <div class="hub-card-desc">言语理解</div>
      </div>
      <div class="hub-card" onclick="openContent('knowledge')">
        <span class="hub-card-icon">识</span>
        <div class="hub-card-label">常识</div>
        <div class="hub-card-desc">百科知识</div>
      </div>
      <div class="hub-card" onclick="openContent('politics')">
        <span class="hub-card-icon">闻</span>
        <div class="hub-card-label">时政</div>
        <div class="hub-card-desc">紧跟热点</div>
      </div>
    </div>

    <div class="hub-back">
      <button class="hub-back-link" onclick="goToLanding()">← 返回</button>
    </div>
  </div>
</div>

<!-- VIEW 3: CONTENT -->
<div class="view view-content" id="contentView">
  <div class="content-wrap">
    <div class="topbar">
      <button class="back-btn" onclick="backToHub()">← 返回</button>
      <span class="topbar-title" id="contentTitle">—</span>
      <span class="topbar-date" id="topbarDate">—</span>
    </div>

    <main id="content"><div class="loading">—</div></main>

    <nav class="bottombar">
      <button class="nav-btn" onclick="prevDay()">前一天</button>
      <select class="nav-select" id="dateSelect" onchange="jumpTo(this.value)"></select>
      <button class="nav-btn" onclick="nextDay()">后一天</button>
      <button class="nav-btn nav-today" onclick="goToday()">今天</button>
    </nav>

    <footer class="site-footer">考公补给站</footer>
  </div>
</div>

<script>
let allDates=[],currentDate='',currentCategory='idioms',reportsData=null;

const CATEGORY_CONFIG={
  idioms:{title:'成语',emptyIcon:'一',emptyText:'成语内容准备中',emptyHint:'每日成语即将上线'},
  vocab:{title:'实词',emptyIcon:'字',emptyText:'实词内容准备中',emptyHint:'言语理解专项即将上线'},
  knowledge:{title:'常识',emptyIcon:'识',emptyText:'常识内容准备中',emptyHint:'百科常识即将上线'},
  politics:{title:'时政',emptyIcon:'闻',emptyText:'时政内容准备中',emptyHint:'时政热点即将上线'},
};

const QUOTES=[
  '慢慢来，比较快','日拱一卒，功不唐捐','每一天的积累都在靠近答案',
  '你走的每一步，都算数','厚积薄发，水到渠成','安静下来，把一道题一道题做好',
  '积沙成塔','集腋成裘',
];

function pickQuote(){return QUOTES[Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5)%QUOTES.length];}
function computeStreak(){if(allDates.length===0)return 0;let s=1;for(let i=1;i<allDates.length;i++){let d=(new Date(allDates[i-1])-new Date(allDates[i]))/864e5;if(Math.abs(d-1)<0.1)s++;else break;}return s;}

function switchView(from,to){from.classList.remove('view-visible');to.classList.add('view-visible');setTimeout(()=>{to.scrollTop=0;},60);}
function goToHub(){switchView(document.getElementById('landingView'),document.getElementById('hubView'));}
function backToHub(){switchView(document.getElementById('contentView'),document.getElementById('hubView'));}
function goToLanding(){refreshLandingStats();switchView(document.getElementById('hubView'),document.getElementById('landingView'));}
function openContent(cat){currentCategory=cat;currentDate=allDates.length>0?allDates[0]:'';document.getElementById('contentTitle').textContent=CATEGORY_CONFIG[cat].title;renderCategoryContent();switchView(document.getElementById('hubView'),document.getElementById('contentView'));}

function refreshLandingStats(){
  document.getElementById('landingStreak').textContent='已坚持 '+computeStreak()+' 天';
  document.getElementById('landingDate').textContent=allDates.length>0?reportsData.reports[allDates[0]].date:'—';
  document.getElementById('landingQuote').textContent=pickQuote();
}

function renderCategoryContent(){
  const cfg=CATEGORY_CONFIG[currentCategory];
  document.getElementById('topbarDate').textContent=currentDate?reportsData.reports[currentDate].date:'—';
  populateSelect();
  const report=currentDate?reportsData.reports[currentDate]:null;
  let html='';

  if(currentCategory==='idioms'&&report&&report.idioms&&report.idioms.length>0){
    html+='<section class="section">';
    html+='<div class="section-label">Idioms</div>';
    html+='<h2 class="section-title">成语 <span class="count">'+report.idioms.length+'个</span></h2>';
    html+='<div class="idiom-grid">';
    report.idioms.forEach(i=>{
      html+='<div class="idiom-card">';
      html+='<div class="idiom-word">'+esc(i.idiom)+'</div>';
      html+='<div class="idiom-explain">'+esc(i.explanation||'')+'</div>';
      if(i.focus)html+='<span class="idiom-focus">'+esc(i.focus)+'</span>';
      html+='</div>';
    });
    html+='</div></section>';
  }else if((currentCategory==='knowledge'||currentCategory==='politics')&&report&&report.knowledge&&report.knowledge.length>0){
    html+='<section class="section">';
    html+='<div class="section-label">Knowledge</div>';
    html+='<h2 class="section-title">'+cfg.title+' <span class="count">'+report.knowledge.length+'条</span></h2>';
    html+='<div class="knowledge-list">';
    report.knowledge.forEach(k=>{
      html+='<div class="knowledge-card">';
      html+='<div class="k-tag">'+esc(k.category)+'</div>';
      html+='<div class="k-title">'+esc(k.title)+'</div>';
      html+='<div class="k-body">'+esc(k.body)+'</div>';
      if(k.exam_point)html+='<div class="exam-point">'+esc(k.exam_point)+'</div>';
      html+='</div>';
    });
    html+='</div></section>';
  }else{
    html+='<div class="empty-state">';
    html+='<span class="empty-icon">'+cfg.emptyIcon+'</span>';
    html+='<div class="empty-text">'+cfg.emptyText+'</div>';
    html+='<div class="empty-hint">'+cfg.emptyHint+'</div>';
    html+='</div>';
  }

  document.getElementById('content').innerHTML=html;
  const cv=document.getElementById('contentView');if(cv)cv.scrollTop=0;
}

function populateSelect(){
  const sel=document.getElementById('dateSelect');
  if(!sel)return;
  sel.innerHTML=allDates.map(d=>'<option value="'+d+'"'+(d===currentDate?' selected':'')+'>'+d.slice(5)+'</option>').join('');
}

function prevDay(){const i=allDates.indexOf(currentDate);if(i<allDates.length-1){currentDate=allDates[i+1];renderCategoryContent();}}
function nextDay(){const i=allDates.indexOf(currentDate);if(i>0){currentDate=allDates[i-1];renderCategoryContent();}}
function jumpTo(d){currentDate=d;renderCategoryContent();}
function goToday(){if(allDates.length>0){currentDate=allDates[0];renderCategoryContent();}}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function init(){
  const resp=await fetch('data.json?'+Date.now());
  reportsData=await resp.json();
  allDates=Object.keys(reportsData.reports).sort().reverse();
  if(allDates.length>0)currentDate=allDates[0];
  refreshLandingStats();
  populateSelect();
  renderCategoryContent();
}

init();
</script>
</body>
</html>
