<body>

<a href="#content" class="skip-link">跳到主要内容</a>

<!-- VIEW 1: LANDING -->
<div class="view view-landing view-visible" id="landingView" role="region" aria-label="首页" tabindex="-1">

      <span id="landingDate">—</span> · <span id="landingQuote"></span>
    </div>
    <div class="landing-srs" id="landingSRS" style="display:none;">

      <span class="landing-srs-stat">📚 已学习 <span class="landing-srs-num" id="landingLearned">0</span> 个</span>

<!-- VIEW 2: HUB -->
<div class="view view-hub" id="hubView" role="region" aria-label="学习中心" tabindex="-1">
  <div class="hub" style="position:relative;">
    <button class="hub-settings" onclick="openSettings()" aria-label="设置">⚙</button>
    <div class="hub-label" id="hubModeLabel">Today's Study</div>
    <h2 class="hub-title" id="hubModeTitle">今日学习</h2>

    <div class="mode-toggle">
      <button class="mode-pill active" id="modeBrowse" onclick="setMode('browse')">浏览模式</button>
      <button class="mode-pill" id="modeLearn" onclick="setMode('learn')">学习模式</button>
    </div>

    <div class="hub-grid">
      <div class="hub-card" role="button" tabindex="0" onclick="handleHubCardClick('idioms')">
        <span class="hub-card-icon">一</span>
        <div class="hub-card-label">成语</div>
        <div class="hub-card-desc" id="hubDescIdioms">每日积累</div>
      </div>
      <div class="hub-card" role="button" tabindex="0" onclick="handleHubCardClick('vocab')">
        <span class="hub-card-icon">字</span>
        <div class="hub-card-label">实词</div>
        <div class="hub-card-desc" id="hubDescVocab">言语理解</div>
      </div>
      <div class="hub-card" role="button" tabindex="0" onclick="handleHubCardClick('knowledge')">
        <span class="hub-card-icon">识</span>
        <div class="hub-card-label">常识</div>
        <div class="hub-card-desc" id="hubDescKnowledge">百科知识</div>
      </div>
      <div class="hub-card" role="button" tabindex="0" onclick="handleHubCardClick('politics')">
        <span class="hub-card-icon">闻</span>
        <div class="hub-card-label">时政</div>
        <div class="hub-card-desc" id="hubDescPolitics">紧跟热点</div>
      </div>
    </div>

    <div class="hub-back">
      <button class="hub-back-link" onclick="goToLanding()">← 返回</button>
    </div>
  </div>
</div>

<!-- VIEW 3: SRS LEARNING -->
<div class="view view-learn" id="learnView" role="region" aria-label="SRS智能学习" tabindex="-1">
  <div class="learn-wrap">
    <div class="topbar">
      <button class="back-btn" onclick="exitSRS()">← 退出</button>
      <span class="topbar-title" id="learnTitle">学习模式</span>
      <span class="topbar-date" id="learnProgress">0/0</span>
    </div>
    <div class="learn-progress-bar"><div class="learn-progress-fill" id="learnProgressFill" style="width:0%"></div></div>
    <main id="learnContent"><div class="loading">准备中...</div></main>
  </div>
</div>

<!-- VIEW 4: SETTINGS -->
<div class="view view-settings" id="settingsView" role="dialog" aria-label="设置" aria-hidden="true" tabindex="-1">
  <div class="settings-panel">
    <div class="settings-header">
      <span class="settings-title">学习设置</span>
      <button class="settings-close" onclick="closeSettings()" aria-label="关闭">✕</button>
    </div>
    <div class="settings-group" id="settingsSliders"></div>
    <div class="settings-total" id="settingsTotal">今日总计: 21 个</div>
    <div class="settings-actions">
      <button class="settings-btn" onclick="resetSettings()">恢复默认</button>
      <button class="settings-btn primary" onclick="saveSettings()">保存设置</button>
    </div>
    <div class="sync-section">
      <div class="sync-label">跨设备同步码</div>
      <div class="sync-code">
        <span class="sync-code-text" id="syncCodeText">----</span>
        <button class="settings-btn" onclick="copySyncCode()" style="flex:0;min-width:60px;padding:8px 14px;font-size:0.72rem;">复制</button>
      </div>
      <div style="font-size:0.68rem;color:var(--ink-muted);margin-top:6px;">把此码复制到另一台设备绑定，即可同步进度</div>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center;">
        <input id="bindCodeInput" placeholder="粘贴另一台设备的同步码" style="flex:1;padding:8px 10px;font-size:0.72rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);" maxlength="64">
        <button class="settings-btn" onclick="bindSyncCode()" style="flex:0;min-width:60px;padding:8px 14px;font-size:0.72rem;">绑定</button>
      </div>
      <div id="bindMsg" style="font-size:0.68rem;margin-top:4px;display:none;"></div>
    </div>
  </div>
</div>

<!-- VIEW 3: CONTENT (Daily Browse) -->
<div class="view view-content" id="contentView" role="region" aria-label="学习内容" tabindex="-1">
  <div class="content-wrap">
    <div class="topbar">
      <button class="back-btn" onclick="backToHub()">← 返回</button>
      <span class="topbar-title" id="contentTitle">—</span>
      <span class="topbar-date" id="topbarDate">—</span>
    </div>

    <main id="content"><div class="loading">—</div></main>

    <nav class="bottombar">
      <button class="nav-btn" onclick="prevDay()">前一天</button>
      <select class="nav-select" id="dateSelect" aria-label="选择日期" onchange="jumpTo(this.value)"></select>
      <button class="nav-btn" onclick="nextDay()">后一天</button>
      <button class="nav-btn nav-today" onclick="goToday()">今天</button>
    </nav>

    <footer class="site-footer">考公补给站</footer>
  </div>
</div>

<script>
let allDates=[],currentDate='',currentCategory='idioms',reportsData=null;
let displayCount=0;
let currentIndex=0;
const COUNT_OPTIONS=[3,5,10];
const STORAGE_KEY='kaogong_state';
const SRS_KEY='kaogong_srs_v2';
const SRS_VERSION=2;
var touchStartX=0,touchStartY=0,touchStartTime=0;

/* ── SRS Globals ── */
var ITEM_POOLS=null;               // {idioms:[], vocab:[], knowledge:[], politics:[]}
var srsState=null;                 // full kaogong_srs state object
var learnSession=null;             // {category, queue:[], idx, reviewCount, newCount}
var currentMode='browse';          // 'browse' | 'learn'
var cardRevealed=false;            // whether current card back is showing

const CATEGORY_CONFIG={
  idioms:{title:'成语',emptyIcon:'一',emptyText:'成语内容准备中',emptyHint:'每日成语即将上线'},
  vocab:{title:'实词',emptyIcon:'字',emptyText:'实词内容准备中',emptyHint:'言语理解专项即将上线'},
  knowledge:{title:'常识',emptyIcon:'识',emptyText:'常识内容准备中',emptyHint:'百科常识即将上线'},
  politics:{title:'时政',emptyIcon:'闻',emptyText:'时政内容准备中',emptyHint:'时政热点即将上线'},
};

const QUOTES=[
  '慢慢来，比较快','日拱一卒，功不唐捐','每一天的积累都在靠近答案',
  '你走的每一步，都算数','厚积薄发，水到渠成','安静下来，把一道题一道题做好',
  '积沙成塔','集腋成裘',
];

function pickQuote(){return QUOTES[Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5)%QUOTES.length];}
function computeStreak(){if(allDates.length===0)return 0;let s=1;for(let i=1;i<allDates.length;i++){let d=(new Date(allDates[i-1])-new Date(allDates[i]))/864e5;if(Math.abs(d-1)<0.1)s++;else break;}return s;}

function saveState(){try{var s={d:currentDate,c:currentCategory,n:displayCount,i:currentIndex};localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){}}
function loadState(){try{var s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}return null;}
function updateHubCounts(){if(!reportsData||allDates.length===0)return;var r=reportsData.reports[allDates[0]];if(!r)return;var d=document.getElementById('hubDescIdioms');if(d)d.textContent='每日积累 · '+(r.idioms||[]).length+'个';d=document.getElementById('hubDescVocab');if(d)d.textContent='言语理解 · '+(r.vocab||[]).length+'组';d=document.getElementById('hubDescKnowledge');if(d)d.textContent='百科知识 · '+(r.knowledge||[]).length+'条';d=document.getElementById('hubDescPolitics');if(d)d.textContent='紧跟热点 · '+((r.politics||[]).length||0)+'条';}

function switchView(from,to){from.classList.remove('view-visible');from.setAttribute('aria-hidden','true');to.classList.add('view-visible');to.setAttribute('aria-hidden','false');setTimeout(function(){to.scrollTop=0;if(to.focus)to.focus();},60);}
function goToHub(){switchView(document.getElementById('landingView'),document.getElementById('hubView'));}
function backToHub(){switchView(document.getElementById('contentView'),document.getElementById('hubView'));}
function goToLanding(){refreshLandingStats();switchView(document.getElementById('hubView'),document.getElementById('landingView'));}
function openContent(cat){currentCategory=cat;displayCount=0;currentIndex=0;currentDate=allDates.length>0?allDates[0]:'';document.getElementById('contentTitle').textContent=CATEGORY_CONFIG[cat].title;renderCategoryContent();saveState();switchView(document.getElementById('hubView'),document.getElementById('contentView'));}

function refreshLandingStats(){
  document.getElementById('landingStreak').textContent='已坚持 '+computeStreak()+' 天';
  document.getElementById('landingDate').textContent=allDates.length>0?reportsData.reports[allDates[0]].date:'—';
  document.getElementById('landingQuote').textContent=pickQuote();
}

function getCurrentItems(){
  var report=currentDate?reportsData.reports[currentDate]:null;
  if(!report)return[];
  if(currentCategory==='idioms')return report.idioms||[];
  if(currentCategory==='vocab')return report.vocab||[];
  if(currentCategory==='politics')return report.politics||[];
  return report.knowledge||[];
}

function renderCategoryContent(){
  var cfg=CATEGORY_CONFIG[currentCategory];
  document.getElementById('topbarDate').textContent=currentDate?reportsData.reports[currentDate].date:'—';
  populateSelect();
  var allItems=getCurrentItems();
  var total=allItems.length;
  var html='';

  function buildCounts(total){
    var a=COUNT_OPTIONS.filter(function(n){return n<total;});
    a.push(0);
    return a.filter(function(v,i,s){return s.indexOf(v)===i;});
  }

  function pillsHTML(counts){
    var labels={3:'3个',5:'5个',10:'10个',0:'全部'};
    var h='<div class="count-selector">';
    counts.forEach(function(c){
      h+='<button class="count-pill'+(c===displayCount?' active':'')+'" onclick="setCount('+c+')">'+labels[c]+'</button>';
    });
    h+='</div>';
    return h;
  }

  // --- Empty ---
  if(total===0){
    html+='<div class="empty-state">';
    html+='<span class="empty-icon">'+cfg.emptyIcon+'</span>';
    html+='<div class="empty-text">'+cfg.emptyText+'</div>';
    html+='<div class="empty-hint">'+cfg.emptyHint+'</div>';
    html+='</div>';
    document.getElementById('content').innerHTML=html;
    var cv=document.getElementById('contentView');if(cv)cv.scrollTop=0;
    return;
  }

  var counts=buildCounts(total);
  if(displayCount===0||displayCount>total)displayCount=0;
  var items=displayCount===0?allItems:allItems.slice(0,displayCount);
  var actualTotal=items.length;

  // Clamp index
  if(currentIndex>=actualTotal)currentIndex=actualTotal-1;
  if(currentIndex<0)currentIndex=0;

  var isIdiom=currentCategory==='idioms';
  var isVocab=currentCategory==='vocab';
  var unit=isIdiom?'个':'条';
  var sectionLabel=isIdiom?'Idioms':(isVocab?'Vocab':'Knowledge');

  html+='<section class="section">';
  html+='<div class="section-label">'+sectionLabel+'</div>';
  html+='<div class="section-header">';
  html+='<h2 class="section-title">'+cfg.title+' <span class="count">'+actualTotal+'/'+total+unit+'</span></h2>';
  html+=pillsHTML(counts);
  html+='</div>';

  // --- Flashcard ---
  if(currentIndex<actualTotal){
    var item=items[currentIndex];
    html+='<div class="flashcard-wrap">';
    html+='<div class="flashcard-progress">第 '+(currentIndex+1)+'/'+actualTotal+unit+'</div>';
    html+='<div class="flashcard">';
    if(isIdiom){
      html+='<div class="fc-idiom-word">'+esc(item.idiom)+'</div>';
      html+='<div class="fc-idiom-explain">'+esc(item.explanation||'')+'</div>';
      if(item.focus)html+='<div class="fc-idiom-focus">'+esc(item.focus)+'</div>';
    } else {
      html+='<div class="fc-k-tag">'+esc(item.category)+'</div>';
      html+='<div class="fc-k-title">'+esc(item.title)+'</div>';
      html+='<div class="fc-k-body">'+esc(item.body)+'</div>';
      if(item.exam_point)html+='<div class="fc-exam-point">'+esc(item.exam_point)+'</div>';
    }
    html+='</div>';

    // Navigation
    html+='<div class="flashcard-nav">';
    html+='<button class="fc-nav-btn" onclick="prevCard()"'+(currentIndex===0?' disabled':'')+'>← 上一个</button>';
    if(currentIndex<actualTotal-1){
      html+='<button class="fc-nav-btn fc-nav-primary" onclick="nextCard()">记住了 →</button>';
    } else {
      html+='<button class="fc-nav-btn fc-nav-primary" onclick="finishSession()">✓ 完成</button>';
    }
    html+='</div>';
    html+='</div>';
  } else {
    // Completion
    html+='<div class="flashcard-done">';
    html+='<span class="fc-done-icon">✓</span>';
    html+='<div class="fc-done-text">全部完成</div>';
    html+='<div class="fc-done-hint">今天又进步了一点</div>';
    html+='<button class="fc-nav-btn fc-nav-primary" style="margin-top:28px" onclick="currentIndex=0;renderCategoryContent();">再来一遍</button>';
    html+='</div>';
  }

  html+='</section>';

  document.getElementById('content').innerHTML=html;
  var cv=document.getElementById('contentView');if(cv)cv.scrollTop=0;
  // Update bottom nav disabled states
  var idx=allDates.indexOf(currentDate);
  var prevBtn=document.querySelector('button[onclick*="prevDay"]');
  var nextBtn=document.querySelector('button[onclick*="nextDay"]');
  if(prevBtn)prevBtn.disabled=idx>=allDates.length-1;

/* ══════════════════════════════════════════
   SRS: SM-2 Algorithm + State Management
   ══════════════════════════════════════════ */

function toDateStr(d){return d instanceof Date?d.toISOString().slice(0,10):d;}
function addDays(ds,n){var d=new Date(ds);d.setDate(d.getDate()+n);return toDateStr(d);}
function daysAgo(ds){return Math.floor((new Date()-new Date(ds))/864e5);}

function createCardState(){
  return {ease:2.5,interval:0,reps:0,nextReview:null,lastReview:null,firstLearned:null,status:'new'};
}

function sm2(card,rating,now){
  var today=toDateStr(now||new Date());
  var s=Object.assign({},card);
  if(rating===1){
    // Again: reset
    s.reps=0;s.interval=1;
  }else if(rating===3){
    // Hard
    s.interval=Math.max(1,Math.round((s.interval||1)*1.2));
    s.ease=Math.max(1.3,s.ease-0.15);s.reps+=1;
  }else if(rating===5){
    // Good
    if(s.reps===0)s.interval=4;
    else if(s.reps===1)s.interval=10;
    else s.interval=Math.round(s.interval*s.ease*1.3);
    s.ease=Math.min(3.0,s.ease+0.15);s.reps+=1;
  }
  s.nextReview=addDays(today,s.interval);
  s.lastReview=today;
  if(!s.firstLearned)s.firstLearned=today;
  s.status=s.interval>=60?'mastered':s.interval>=21?'graduate':'learning';
  return s;
}

function intervalHint(card,rating){
  if(!card||card.interval===0){
    if(rating===1)return '再来一次';
    if(rating===3)return '<10分钟';
    return '4天';
  }
  var s=Object.assign({},card);
  if(rating===1)return '再来一次';
  if(rating===3){s.interval=Math.max(1,Math.round(s.interval*1.2));}
  else{s.interval=s.reps===0?4:s.reps===1?10:Math.round(s.interval*s.ease*1.3);}
  if(s.interval<1)return '<1天';
  if(s.interval===1)return '1天';
  if(s.interval<30)return s.interval+'天';
  return Math.round(s.interval/30)+'月';
}

/* ── Queue Builder ── */

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function getItemKey(cat,item){
  if(cat==='idioms')return cat+':'+(item.idiom||item.id);
  return cat+':'+(item.title||item.id);
}

function buildQueue(category){
  if(!ITEM_POOLS)return null;
  var pool=ITEM_POOLS[category];
  if(!pool||!pool.length)return null;

  var limit=srsState.settings.dailyLimits[category]||5;
  var today=toDateStr(new Date());
  var dueReviews=[],newItems=[];

  pool.forEach(function(item){
    var key=getItemKey(category,item);
    var card=srsState.items[key];
    if(!card||card.nextReview===null){
      // New — never studied
      newItems.push(key);
    }else if(card.nextReview<=today){
      // Due for review
      dueReviews.push({key:key,nextReview:card.nextReview});
    }
    // else: future — skip
  });

  // Sort due reviews: most overdue first
  dueReviews.sort(function(a,b){return a.nextReview.localeCompare(b.nextReview);});

  // Shuffle new items
  newItems=shuffle(newItems);

  // Build: reviews first, then new up to limit
  var queue=[];
  var reviewCount=Math.min(dueReviews.length,limit);
  for(var i=0;i<reviewCount;i++)queue.push(dueReviews[i].key);
  var newCount=Math.min(limit-queue.length,newItems.length);
  for(var i=0;i<newCount;i++)queue.push(newItems[i]);

  return {
    category:category,
    queue:queue,
    idx:0,
    reviewCount:reviewCount,
    newCount:newCount,
    overdueTotal:dueReviews.length,
    newRemaining:newItems.length-newCount,
    totalPool:pool.length
  };
}

/* ── Stats ── */

function recomputeStats(){
  var today=toDateStr(new Date());
  var totalLearned=0,totalMastered=0;
  for(var k in srsState.items){
    var c=srsState.items[k];
    if(c.status!=='new')totalLearned++;
    if(c.status==='mastered')totalMastered++;
  }
  srsState.stats.totalLearned=totalLearned;
  srsState.stats.totalMastered=totalMastered;

  // Streak
  if(srsState.stats.lastStudyDate){
    var d=new Date(srsState.stats.lastStudyDate);
    var t=new Date(today);
    var diff=Math.floor((t-d)/864e5);
    if(diff<=1)srsState.stats.streakDays=Math.max(srsState.stats.streakDays,1);
    else srsState.stats.streakDays=1;
  }
  srsState.stats.lastStudyDate=today;

  // Capped review history
  srsState.stats.reviewHistory[today]=(srsState.stats.reviewHistory[today]||0);
  var keys=Object.keys(srsState.stats.reviewHistory).sort();
  while(keys.length>365){delete srsState.stats.reviewHistory[keys.shift()];}

  srsState.updatedAt=Date.now();
  saveSRSState();
}

function countDueToday(){
  if(!srsState||!ITEM_POOLS)return {idioms:0,vocab:0,knowledge:0,total:0};
  var today=toDateStr(new Date());
  var counts={idioms:0,vocab:0,knowledge:0,total:0};
  ['idioms','vocab','knowledge'].forEach(function(cat){
    var pool=ITEM_POOLS[cat];
    if(!pool)return;
    pool.forEach(function(item){
      var key=getItemKey(cat,item);
      var card=srsState.items[key];
      if(card&&card.nextReview&&card.nextReview<=today&&card.status!=='mastered')counts[cat]++;
    });
    counts.total+=counts[cat];
  });
  return counts;
}

function getUID(){
  var uid=localStorage.getItem('kaogong_uid');
  if(!uid){
    uid='kg-'+Math.random().toString(36).slice(2,10)+Math.random().toString(36).slice(2,4);
    localStorage.setItem('kaogong_uid',uid);
  }
  return uid;
}

async function syncData(){
  if(!srsState)return;
  var uid=getUID();
  var syncUrl='https://shanganbujizhan.top/sync?uid='+encodeURIComponent(uid);
  try{
    // GET: fetch remote state
    var resp=await fetch(syncUrl,{method:'GET',signal:AbortSignal.timeout(5000)});
    if(resp.ok){
      var remote=await resp.json();
      if(remote&&remote.updatedAt){
        // Merge: take the newer one
        if(remote.updatedAt>(srsState.updatedAt||0)){
          // Remote is newer — use remote
          srsState=remote;
          saveSRSState();
        }
        // else: local is newer or equal, keep local
      }
    }
  }catch(e){/* offline — silently skip */}

  // POST: push local state
  try{
    await fetch(syncUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(srsState),
      signal:AbortSignal.timeout(5000)
    });
  }catch(e){/* offline — silently skip */}
}

function revealCard(){
  if(cardRevealed)return;
  cardRevealed=true;
  var card=document.getElementById('learnCard');
  var front=card.querySelector('.learn-card-front');
  var back=card.querySelector('.learn-card-back');
  if(front)front.style.display='none';
  if(back)back.style.display='flex';
}

function rateCard(rating){
  if(!learnSession||learnSession.idx>=learnSession.queue.length)return;
  var key=learnSession.queue[learnSession.idx];
  var card=srsState.items[key]||createCardState();
  var isNew=!card.nextReview;

  srsState.items[key]=sm2(card,rating);
  srsState.stats.totalReviews=(srsState.stats.totalReviews||0)+1;
  if(isNew&&rating!==1)learnSession.newCount=Math.max(0,(learnSession.newCount||0)-1);

  learnSession.idx++;

  if(learnSession.idx>=learnSession.queue.length){
    // Session complete
    recomputeStats();
    learnSession=null;
    syncData();
    saveSRSState();
    renderLearnDone();
  }else{
    saveSRSState();
    renderLearnCard();
  }
}

function renderLearnDone(){

  html+='<div class="learn-done-stats">复习: '+(learnSession?learnSession.reviewCount:0)+' 个 &nbsp; 新学: '+(learnSession?learnSession.newCount:0)+' 个</div>';

  html+='</div>';

function forceLearnCategory(category){
  // Build queue with only due reviews (no daily limit)
  if(!ITEM_POOLS)return;
  var pool=ITEM_POOLS[category];
  var today=toDateStr(new Date());
  var dueReviews=[];
  pool.forEach(function(item){
    var key=getItemKey(category,item);
    var card=srsState.items[key];
    if(card&&card.nextReview&&card.nextReview<=today&&card.status!=='mastered'){
      dueReviews.push(key);
    }
  });
  dueReviews.sort(function(a,b){
    return (srsState.items[a]||{}).nextReview.localeCompare((srsState.items[b]||{}).nextReview);
  });
  if(dueReviews.length===0)return;
  learnSession={
    category:category,queue:dueReviews,idx:0,
    reviewCount:dueReviews.length,newCount:0,
    overdueTotal:dueReviews.length,newRemaining:0,totalPool:pool.length
  };
  cardRevealed=false;
  renderLearnCard();
}

  learnSession=null;
  cardRevealed=false;
  updateHubDueCounts();

  switchView(document.getElementById('learnView'),document.getElementById('hubView'));

function findItemByKey(cat,key){
  if(!ITEM_POOLS||!ITEM_POOLS[cat])return null;
  var pool=ITEM_POOLS[cat];
  for(var i=0;i<pool.length;i++){
    if(getItemKey(cat,pool[i])===key)return pool[i];
  }
  return null;
}

  if(navigator.clipboard){
    navigator.clipboard.writeText(code).then(function(){
      alert('同步码已复制：'+code+'\n把此码粘贴到另一台设备设置中即可同步');
    });
  }else{
    prompt('复制此同步码，在新设备的设置中输入：',code);
  }
}

async function bindSyncCode(){
  var input=document.getElementById('bindCodeInput');
  var msg=document.getElementById('bindMsg');
  var code=input.value.trim();
  if(!code||code.length<5){
    msg.style.display='block';
    msg.style.color='var(--rating-again)';
    msg.textContent='请粘贴有效的同步码';
    return;
  }
  if(code===getUID()){
    msg.style.display='block';
    msg.style.color='var(--ink-muted)';
    msg.textContent='这就是当前设备的同步码，无需绑定';
    return;
  }
  localStorage.setItem('kaogong_uid',code);
  msg.style.display='block';
  msg.style.color='var(--ink-muted)';
  msg.textContent='正在同步...';
  try{
    var resp=await fetch('https://shanganbujizhan.top/sync?uid='+encodeURIComponent(code),{signal:AbortSignal.timeout(5000)});
    if(!resp.ok)throw new Error('network');
    var remote=await resp.json();
    if(remote&&remote.items&&Object.keys(remote.items).length>0){
      srsState=remote;
      saveSRSState();
      document.getElementById('syncCodeText').textContent=code;
      updateHubDueCounts();
      updateLandingSRSStats();
      msg.style.color='var(--rating-good)';
      msg.textContent='已绑定！同步了 '+Object.keys(remote.items).length+' 条学习记录';
    }else{
      document.getElementById('syncCodeText').textContent=code;
      msg.style.color='var(--rating-good)';
      msg.textContent='已绑定，云端暂无数据，先开始学习吧';
    }
    input.value='';
  }catch(e){
    document.getElementById('syncCodeText').textContent=code;
    msg.style.color='var(--ink-muted)';
    msg.textContent='已绑定（离线同步将在联网后自动完成）';
    input.value='';
  }
}

/* ── Landing Stats ── */

function updateLandingSRSStats(){
  if(!srsState||!ITEM_POOLS)return;
  var due=countDueToday();
  var el=document.getElementById('landingSRS');
  if(el){
    el.style.display='flex';
    document.getElementById('landingDue').textContent=due.total;
    document.getElementById('landingLearned').textContent=srsState.stats.totalLearned;
  }
}

async function init(){
  try {
    var today=new Date().toISOString().slice(0,10);

    // Fetch data.json + items.json in parallel
    var results=await Promise.allSettled([
      fetch('data.json?v='+today+'-v15'),
      fetch('items.json?v='+today+'-v1')
    ]);

    // --- data.json (required for daily browse) ---
    if(results[0].status==='fulfilled'&&results[0].value.ok){
      reportsData=await results[0].value.json();
      allDates=Object.keys(reportsData.reports).sort().reverse();
      if(allDates.length>0)currentDate=allDates[0];
    }else{
      console.warn('data.json load failed, browse mode degraded');
    }

    // --- items.json (enables SRS learning) ---
    if(results[1].status==='fulfilled'&&results[1].value.ok){
      ITEM_POOLS=await results[1].value.json();
    }else{
      console.warn('items.json load failed, SRS mode degraded');
    }

    // --- SRS Init ---
    initSRSState();
    if(ITEM_POOLS)syncData().then(function(){updateHubDueCounts();updateLandingSRSStats();});

    // Restore saved browse state
    var saved=loadState();
    if(saved&&saved.d&&allDates.indexOf(saved.d)>=0){
      currentDate=saved.d;
      if(saved.c)currentCategory=saved.c;
      if(typeof saved.n==='number')displayCount=saved.n;
      if(typeof saved.i==='number')currentIndex=saved.i;
    }

    refreshLandingStats();
    updateHubCounts();
    if(ITEM_POOLS)updateLandingSRSStats();
    populateSelect();
    renderCategoryContent();
  } catch(err) {
    console.error('加载失败:',err);
    document.getElementById('landingStreak').textContent='加载失败，请刷新重试';
    var btn=document.querySelector('.landing-btn');
    if(btn){btn.textContent='重新加载';btn.onclick=function(){location.reload();};}
  }
}

// Keyboard support: hub cards + flashcard arrows + SRS rating
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&e.target.classList.contains('hub-card')){
    e.target.click();
    return;
  }
  // SRS Learning mode: 1=Again, 2=Hard, 3=Good
  var lv=document.getElementById('learnView');
  if(lv&&lv.classList.contains('view-visible')&&learnSession){
    if(e.key==='1'){e.preventDefault();rateCard(1);}
    else if(e.key==='2'){e.preventDefault();rateCard(3);}
    else if(e.key==='3'){e.preventDefault();rateCard(5);}
    else if(e.key==='ArrowRight'){e.preventDefault();if(!cardRevealed)revealCard();}
    else if(e.key==='ArrowLeft'){e.preventDefault();}
    else if(e.key===' '||e.key==='Spacebar'){e.preventDefault();if(!cardRevealed)revealCard();else rateCard(5);}
    return;
  }
  // Daily browse mode: arrow keys
  var cv=document.getElementById('contentView');
  if(cv&&cv.classList.contains('view-visible')){
    if(e.key==='ArrowRight'){e.preventDefault();nextCard();}
    else if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
  }
  // Settings: Escape to close
  var sv=document.getElementById('settingsView');
  if(e.key==='Escape'&&sv&&sv.classList.contains('view-visible')){
    closeSettings();
  }
});

// Touch swipe support for flashcard navigation
document.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchStartTime=Date.now();},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  var dt=Date.now()-touchStartTime;
  if(dt<50)return;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>60){
    var cv=document.getElementById('contentView');
    if(cv&&cv.classList.contains('view-visible')){
      if(dx<0)nextCard();
      else prevCard();
    }
  }
},{passive:true});

// Service Worker
if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

init();
</script>
