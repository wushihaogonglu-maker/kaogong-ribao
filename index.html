<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考公补给站</title>
<style>
/* ===========================================
   考公补给站 — Glass Edition v2
   Three-page: Landing → Hub (4 cards) → Content
   =========================================== */

:root {
  --glass-bg:     rgba(255,255,255,0.5);
  --glass-border: rgba(255,255,255,0.4);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.03);
  --glass-blur:   18px;

  --text:        #2C2416;
  --text-muted:  #8C7E6B;
  --accent:      #B8860B;
  --accent-light:#E8C96A;
  --radius-xl:   24px;
  --radius-lg:   18px;
  --radius-md:   14px;

  --font-body:    "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  --font-display: "Noto Serif SC", "Source Han Serif SC", serif;
  --ease:         cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 15px; height: 100%; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  color: var(--text);
  line-height: 1.75;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  background: #FAF6EF;
}

/* ===========================================
   ANIMATED AMBIENT BACKGROUND
   =========================================== */

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Large slow orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.4;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(232,201,106,0.55) 0%, transparent 70%);
  animation: drift1 18s ease-in-out infinite;
}
.orb-2 {
  width: 420px; height: 420px;
  background: radial-gradient(circle, rgba(180,160,140,0.45) 0%, transparent 70%);
  animation: drift2 22s ease-in-out infinite;
}
.orb-3 {
  width: 380px; height: 380px;
  background: radial-gradient(circle, rgba(170,190,170,0.4) 0%, transparent 70%);
  animation: drift3 20s ease-in-out infinite;
}
.orb-4 {
  width: 340px; height: 340px;
  background: radial-gradient(circle, rgba(200,180,150,0.4) 0%, transparent 70%);
  animation: drift4 24s ease-in-out infinite;
}

@keyframes drift1 {
  0%, 100% { top: -8%; left: -5%; }
  25% { top: 5%; left: 15%; }
  50% { top: -2%; left: 25%; }
  75% { top: 3%; left: 8%; }
}
@keyframes drift2 {
  0%, 100% { top: 40%; right: -10%; }
  25% { top: 30%; right: 5%; }
  50% { top: 50%; right: -5%; }
  75% { top: 35%; right: 10%; }
}
@keyframes drift3 {
  0%, 100% { bottom: -10%; left: 15%; }
  33% { bottom: 5%; left: 30%; }
  66% { bottom: -5%; left: 5%; }
}
@keyframes drift4 {
  0%, 100% { top: 60%; left: 50%; }
  50% { top: 45%; left: 60%; }
}

/* Subtle grain overlay */
.grain {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* ===========================================
   VIEW SYSTEM
   =========================================== */

.view {
  position: fixed;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 1;
  -webkit-overflow-scrolling: touch;
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease), visibility 0.5s;
}

.view-hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

/* Landing: default visible */
.view-landing {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Hub */
.view-hub {
  display: flex;
  align-items: center;
  justify-content: center;
  transform: translateY(20px);
}

.view-hub.view-visible { transform: translateY(0); }

/* Content */
.view-content {
  transform: translateY(20px);
}

.view-content.view-visible { transform: translateY(0); }

.view-visible {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  z-index: 2;
}

/* ===========================================
   LANDING PAGE
   =========================================== */

.landing {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 48px 24px;
}

.landing-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  box-shadow: var(--glass-shadow);
  padding: 56px 48px 44px;
  max-width: 400px;
  width: 100%;
}

.landing-logo {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.16em;
  line-height: 1.3;
}
.landing-sub {
  font-family: var(--font-display);
  font-size: 0.92rem;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-top: 8px;
}
.landing-divider {
  width: 40px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-light), transparent);
  margin: 28px auto;
  border-radius: 1px;
}
.landing-streak {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--accent);
  margin-bottom: 28px;
}

/* Gold gradient button */
.glass-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 210px; height: 52px;
  font-family: var(--font-body);
  font-size: 0.95rem; font-weight: 600;
  letter-spacing: 0.06em;
  color: #FFF;
  background: linear-gradient(135deg, #C9A040, #A07828);
  border: none; border-radius: 999px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(184,134,11,0.3);
  transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.glass-btn:active {
  transform: scale(0.96);
  box-shadow: 0 2px 10px rgba(184,134,11,0.2);
}

.landing-date {
  margin-top: 24px;
  font-family: var(--font-display);
  font-size: 0.82rem;
  color: var(--text-muted);
}
.landing-quote {
  margin-top: 8px;
  font-family: var(--font-display);
  font-size: 0.82rem;
  color: var(--text-muted);
  font-style: italic;
}

/* ===========================================
   HUB PAGE — 4 Glass Cards
   =========================================== */

.hub {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 48px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100%;
}

.hub-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

.hub-sub {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 32px;
  font-family: var(--font-display);
}

.hub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  max-width: 480px;
  width: 100%;
}

.hub-card {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  box-shadow: var(--glass-shadow);
  padding: 28px 20px 24px;
  cursor: pointer;
  text-align: center;
  transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), border-color 0.25s var(--ease);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
}

/* Subtle shine on top */
.hub-card::before {
  content: '';
  position: absolute;
  top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  transition: opacity 0.3s;
}

.hub-card:active {
  transform: scale(0.97);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  border-color: rgba(200,170,100,0.5);
}

.hub-card-icon {
  font-size: 2.2rem;
  margin-bottom: 10px;
  display: block;
  transition: transform 0.3s var(--ease);
}

.hub-card:active .hub-card-icon {
  transform: scale(1.1);
}

.hub-card-label {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.06em;
}

.hub-card-desc {
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.hub-back {
  margin-top: 28px;
}

.hub-back-link {
  background: none;
  border: none;
  font-size: 0.82rem;
  color: var(--text-muted);
  cursor: pointer;
  font-family: var(--font-display);
  padding: 8px 16px;
  border-radius: 999px;
  transition: color 0.2s, background 0.2s;
  -webkit-tap-highlight-color: transparent;
}

.hub-back-link:active {
  color: var(--accent);
  background: rgba(255,255,255,0.3);
}

/* ===========================================
   CONTENT PAGE
   =========================================== */

.content-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: 0 16px 100px;
  position: relative;
  z-index: 2;
}

/* Glass top bar */
.topbar {
  position: sticky;
  top: 12px;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  margin: 12px -8px 24px;
  background: rgba(255,255,255,0.45);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: var(--radius-lg);
  box-shadow: 0 4px 20px rgba(0,0,0,0.04);
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: none; border: none;
  font-size: 0.88rem; color: var(--text-muted);
  cursor: pointer;
  padding: 6px 10px 6px 4px;
  font-family: var(--font-body);
  min-height: 44px;
  border-radius: var(--radius-md);
  -webkit-tap-highlight-color: transparent;
}
.back-btn:active { color: var(--accent); background: rgba(255,255,255,0.3); }

.topbar-title {
  font-family: var(--font-display);
  font-size: 0.95rem; font-weight: 700;
  color: var(--text); letter-spacing: 0.05em;
}

.topbar-date {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: var(--font-display);
}

/* Section */
.section-title {
  font-family: var(--font-display);
  font-size: 1rem; font-weight: 700;
  color: var(--text);
  padding-bottom: 10px; margin-bottom: 16px;
  display: flex; align-items: baseline; gap: 8px;
  border-bottom: 1px solid rgba(0,0,0,0.07);
}
.section-title .count {
  font-family: var(--font-body);
  font-size: 0.72rem; font-weight: 400;
  color: var(--text-muted);
}
.section { margin-bottom: 28px; }
.divider {
  border: none;
  border-top: 1px solid rgba(0,0,0,0.05);
  margin: 28px 0;
}

/* Glass cards */
.idiom-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.glass-card {
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  transition: transform 0.2s var(--ease);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.glass-card:active { transform: scale(0.98); }

.idiom-word {
  font-family: var(--font-display);
  font-size: 1.05rem; font-weight: 700;
  color: var(--accent); margin-bottom: 4px;
}
.idiom-explain {
  font-size: 0.8rem; color: var(--text-muted);
  line-height: 1.7;
  display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.idiom-focus {
  display: inline-block;
  font-size: 0.7rem; font-weight: 500;
  background: rgba(184,134,11,0.07);
  color: var(--accent);
  border-radius: 6px; padding: 2px 10px; margin-top: 8px;
}

/* Knowledge glass card */
.knowledge-card {
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: var(--radius-md);
  padding: 18px 18px 18px 22px;
  border-left: 3px solid var(--accent-light);
  box-shadow: 0 2px 12px rgba(0,0,0,0.03);
  margin-bottom: 10px;
}

.k-tag {
  display: inline-block;
  font-size: 0.68rem; font-weight: 600;
  color: #FFF;
  background: linear-gradient(135deg, #C9A040, #B8860B);
  border-radius: 6px; padding: 3px 12px;
  margin-bottom: 8px; letter-spacing: 0.04em;
}
.k-body {
  font-size: 0.82rem; color: var(--text-muted); line-height: 1.75;
}
.exam-point {
  margin-top: 12px; padding: 10px 14px;
  background: rgba(184,134,11,0.05);
  border-left: 3px solid var(--accent-light);
  border-radius: 0 8px 8px 0;
  font-size: 0.78rem; color: #8B6914; line-height: 1.65;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .empty-icon {
  font-size: 3rem;
  display: block;
  margin-bottom: 12px;
  opacity: 0.6;
}
.empty-state .empty-text {
  font-family: var(--font-display);
  font-size: 0.9rem;
}
.empty-state .empty-hint {
  font-size: 0.78rem;
  margin-top: 6px;
  opacity: 0.7;
}

/* Bottom nav */
.bottombar {
  position: sticky;
  bottom: 12px;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  margin: 28px -8px 0;
  background: rgba(255,255,255,0.4);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: var(--radius-lg);
  box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
}

.nav-pill {
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 0.82rem; color: var(--text);
  cursor: pointer;
  min-width: 44px; min-height: 44px;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-body);
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
.nav-pill:active {
  background: rgba(255,255,255,0.65);
  border-color: var(--accent-light);
  transform: scale(0.96);
}
.nav-select {
  background: rgba(255,255,255,0.35);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.45);
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 0.82rem; color: var(--text);
  cursor: pointer;
  min-height: 44px; max-width: 100px;
  font-family: var(--font-body);
}
.nav-today {
  font-weight: 700;
  background: rgba(184,134,11,0.06);
  border-color: var(--accent-light);
  color: var(--accent);
}

/* Misc */
.loading { text-align: center; color: var(--text-muted); padding: 60px 0; font-size: 0.85rem; }
.site-footer { text-align: center; color: var(--text-muted); font-size: 0.72rem; padding: 20px 0 8px; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 20px; }

/* ===========================================
   RESPONSIVE
   =========================================== */

@media (max-width: 480px) {
  .idiom-grid { grid-template-columns: 1fr; }
  .landing-panel { padding: 40px 24px 32px; max-width: 320px; }
  .landing-logo { font-size: 1.5rem; }
  .glass-btn { width: 190px; height: 48px; font-size: 0.9rem; }
  .hub-grid { gap: 10px; max-width: 340px; }
  .hub-card { padding: 22px 14px 18px; }
  .hub-card-icon { font-size: 1.8rem; }
  .hub-card-label { font-size: 0.95rem; }
  .content-wrap { padding: 0 10px 90px; }
  .topbar { padding: 10px 14px; margin: 8px -4px 20px; }
  .bottombar { padding: 8px 10px; margin: 24px -4px 0; gap: 4px; border-radius: var(--radius-md); }
  .nav-pill { padding: 6px 10px; font-size: 0.76rem; }
}

@media (min-width: 768px) {
  .content-wrap { padding: 0 32px 100px; }
  .topbar { padding: 14px 24px; margin: 12px 0 28px; }
  .bottombar { padding: 10px 20px; margin: 28px 0 0; }
}
</style>
</head>
<body>

<!-- ============================================
     ANIMATED AMBIENT BACKGROUND
     ============================================ -->
<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
</div>
<div class="grain"></div>

<!-- ============================================
     VIEW 1 — LANDING
     ============================================ -->
<div class="view view-landing view-visible" id="landingView">
  <div class="landing">
    <div class="landing-panel">
      <h1 class="landing-logo">考 公 补 给 站</h1>
      <p class="landing-sub">每日一点 · 积沙成塔</p>
      <div class="landing-divider"></div>
      <div class="landing-streak" id="landingStreak">🔥 已坚持 — 天</div>
      <button class="glass-btn" onclick="goToHub()">开始今天的学习</button>
      <div class="landing-date" id="landingDate">—</div>
      <div class="landing-quote" id="landingQuote"></div>
    </div>
  </div>
</div>

<!-- ============================================
     VIEW 2 — HUB (4 Cards)
     ============================================ -->
<div class="view view-hub" id="hubView">
  <div class="hub">
    <h2 class="hub-title">今日学习</h2>
    <p class="hub-sub" id="hubDate">—</p>

    <div class="hub-grid">
      <!-- 成语 -->
      <div class="hub-card" onclick="openContent('idioms')">
        <span class="hub-card-icon">📚</span>
        <div class="hub-card-label">成 语</div>
        <div class="hub-card-desc">每日积累 · 出口成章</div>
      </div>

      <!-- 实词 -->
      <div class="hub-card" onclick="openContent('vocab')">
        <span class="hub-card-icon">📝</span>
        <div class="hub-card-label">实 词</div>
        <div class="hub-card-desc">言语理解 · 精准辨析</div>
      </div>

      <!-- 常识 -->
      <div class="hub-card" onclick="openContent('knowledge')">
        <span class="hub-card-icon">🧠</span>
        <div class="hub-card-label">常 识</div>
        <div class="hub-card-desc">百科知识 · 日积月累</div>
      </div>

      <!-- 时政 -->
      <div class="hub-card" onclick="openContent('politics')">
        <span class="hub-card-icon">📰</span>
        <div class="hub-card-label">时 政</div>
        <div class="hub-card-desc">紧跟热点 · 考场必备</div>
      </div>
    </div>

    <div class="hub-back">
      <button class="hub-back-link" onclick="goToLanding()">← 返回首页</button>
    </div>
  </div>
</div>

<!-- ============================================
     VIEW 3 — CONTENT
     ============================================ -->
<div class="view view-content" id="contentView">
  <div class="content-wrap">
    <div class="topbar">
      <button class="back-btn" onclick="backToHub()">← 返回</button>
      <span class="topbar-title" id="contentTitle">—</span>
      <span class="topbar-date" id="topbarDate">—</span>
    </div>

    <main id="content"><div class="loading">加载中...</div></main>

    <nav class="bottombar">
      <button class="nav-pill" onclick="prevDay()">◀ 前一天</button>
      <select class="nav-select" id="dateSelect" onchange="jumpTo(this.value)"></select>
      <button class="nav-pill" onclick="nextDay()">后一天 ▶</button>
      <button class="nav-pill nav-today" onclick="goToday()">今天</button>
    </nav>

    <footer class="site-footer">考公补给站 · 每日积累</footer>
  </div>
</div>

<script>
/* ============================================
   STATE
   ============================================ */

let allDates = [], currentDate = '', currentCategory = 'idioms', reportsData = null;

const CATEGORY_CONFIG = {
  idioms:   { title: '📚 每日成语', icon: '📚', emptyIcon: '📚', emptyText: '成语内容准备中', emptyHint: '每日成语即将上线，敬请期待' },
  vocab:    { title: '📝 每日实词', icon: '📝', emptyIcon: '📝', emptyText: '实词内容准备中', emptyHint: '言语理解与表达专项即将上线' },
  knowledge:{ title: '🧠 公考常识', icon: '🧠', emptyIcon: '🧠', emptyText: '常识内容准备中', emptyHint: '百科常识每日积累即将上线' },
  politics: { title: '📰 每日时政', icon: '📰', emptyIcon: '📰', emptyText: '时政内容准备中', emptyHint: '时政热点每日推送即将上线' },
};

const QUOTES = [
  '慢慢来，比较快','日拱一卒，功不唐捐','每一天的积累都在靠近答案',
  '你走的每一步，都算数','厚积薄发，水到渠成','今天比昨天多知道一点，就够了',
  '安静下来，把一道题一道题做好','积沙成塔，集腋成裘',
];

function pickQuote() {
  return QUOTES[Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5) % QUOTES.length];
}

function computeStreak() {
  if (allDates.length===0) return 0;
  let s=1;
  for (let i=1;i<allDates.length;i++) {
    let diff=(new Date(allDates[i-1])-new Date(allDates[i]))/864e5;
    if (Math.abs(diff-1)<0.1) s++; else break;
  }
  return s;
}

/* ============================================
   VIEW SWITCHING
   ============================================ */

function switchView(from, to) {
  from.classList.remove('view-visible');
  from.classList.add('view-hidden');
  to.classList.remove('view-hidden');
  to.classList.add('view-visible');
  setTimeout(()=>{ to.scrollTop=0; }, 60);
}

function goToHub() {
  document.getElementById('hubDate').textContent = allDates.length>0 ? reportsData.reports[allDates[0]].date : '—';
  switchView(document.getElementById('landingView'), document.getElementById('hubView'));
}

function goToLanding() {
  refreshLandingStats();
  switchView(document.getElementById('hubView'), document.getElementById('landingView'));
}

function openContent(category) {
  currentCategory = category;
  currentDate = allDates.length>0 ? allDates[0] : '';
  document.getElementById('contentTitle').textContent = CATEGORY_CONFIG[category].title;
  renderCategoryContent();
  switchView(document.getElementById('hubView'), document.getElementById('contentView'));
}

function backToHub() {
  document.getElementById('hubDate').textContent = allDates.length>0 ? reportsData.reports[allDates[0]].date : '—';
  switchView(document.getElementById('contentView'), document.getElementById('hubView'));
}

/* ============================================
   LANDING REFRESH
   ============================================ */

function refreshLandingStats() {
  document.getElementById('landingStreak').textContent = '🔥 已坚持 '+computeStreak()+' 天';
  document.getElementById('landingDate').textContent = allDates.length>0 ? reportsData.reports[allDates[0]].date : '—';
  document.getElementById('landingQuote').textContent = '「'+pickQuote()+'」';
}

/* ============================================
   CONTENT RENDERING
   ============================================ */

function renderCategoryContent() {
  const cfg = CATEGORY_CONFIG[currentCategory];
  document.getElementById('topbarDate').textContent = currentDate
    ? reportsData.reports[currentDate].date : '—';
  populateSelect();

  const report = currentDate ? reportsData.reports[currentDate] : null;
  let html = '';

  if (currentCategory === 'idioms' && report && report.idioms && report.idioms.length>0) {
    html += '<section class="section">';
    html += '<h2 class="section-title">'+cfg.icon+' '+cfg.title+' <span class="count">'+report.idioms.length+'个</span></h2>';
    html += '<div class="idiom-grid">';
    report.idioms.forEach(i=>{
      html += '<div class="glass-card">';
      html += '<div class="idiom-word">'+esc(i.idiom)+'</div>';
      html += '<div class="idiom-explain">'+esc(i.explanation||'')+'</div>';
      if (i.focus) html += '<span class="idiom-focus">🎯 '+esc(i.focus)+'</span>';
      html += '</div>';
    });
    html += '</div></section>';
  } else if ((currentCategory==='knowledge'||currentCategory==='politics') && report && report.knowledge && report.knowledge.length>0) {
    html += '<section class="section">';
    html += '<h2 class="section-title">'+cfg.icon+' '+cfg.title+' <span class="count">'+report.knowledge.length+'条</span></h2>';
    report.knowledge.forEach(k=>{
      html += '<div class="knowledge-card">';
      html += '<span class="k-tag">'+esc(k.category)+'</span>';
      html += '<div class="k-title" style="font-weight:700;font-size:0.92rem;margin-bottom:6px;">'+esc(k.title)+'</div>';
      html += '<div class="k-body">'+esc(k.body)+'</div>';
      if (k.exam_point) html += '<div class="exam-point">📝 考点：'+esc(k.exam_point)+'</div>';
      html += '</div>';
    });
    html += '</section>';
  } else {
    // Empty state
    html += '<div class="empty-state">';
    html += '<span class="empty-icon">'+cfg.emptyIcon+'</span>';
    html += '<div class="empty-text">'+cfg.emptyText+'</div>';
    html += '<div class="empty-hint">'+cfg.emptyHint+'</div>';
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
  const cv=document.getElementById('contentView'); if(cv) cv.scrollTop=0;
}

/* ============================================
   BOTTOM NAV
   ============================================ */

function populateSelect() {
  const sel=document.getElementById('dateSelect');
  if (!sel) return;
  sel.innerHTML = allDates.map(d=>'<option value="'+d+'"'+(d===currentDate?' selected':'')+'>'+d.slice(5)+'</option>').join('');
}

function prevDay(){const i=allDates.indexOf(currentDate);if(i<allDates.length-1){currentDate=allDates[i+1];renderCategoryContent();}}
function nextDay(){const i=allDates.indexOf(currentDate);if(i>0){currentDate=allDates[i-1];renderCategoryContent();}}
function jumpTo(d){currentDate=d;renderCategoryContent();}
function goToday(){if(allDates.length>0){currentDate=allDates[0];renderCategoryContent();}}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ============================================
   INIT
   ============================================ */

async function init() {
  const resp=await fetch('data.json?'+Date.now());
  reportsData=await resp.json();
  allDates=Object.keys(reportsData.reports).sort().reverse();
  if (allDates.length>0) currentDate=allDates[0];
  refreshLandingStats();
  populateSelect();
  renderCategoryContent();
}

init();
</script>
</body>
</html>
