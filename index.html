const QUOTES=[
  '慢慢来，比较快','日拱一卒，功不唐捐','每一天的积累都在靠近答案',
  '你走的每一步，都算数','厚积薄发，水到渠成','安静下来，把一道题一道题做好',
  '积沙成塔','集腋成裘',
];

function pickQuote(){return QUOTES[Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5)%QUOTES.length];}
function computeStreak(){if(allDates.length===0)return 0;let s=1;for(let i=1;i<allDates.length;i++){let d=(new Date(allDates[i-1])-new Date(allDates[i]))/864e5;if(Math.abs(d-1)<0.1)s++;else break;}return s;}

function saveState(){try{var s={d:currentDate,c:currentCategory,n:displayCount,i:currentIndex};localStorage.setItem(STORAGE_KEY,JSON.stringify(s));}catch(e){}}
function loadState(){try{var s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}return null;}
function updateHubCounts(){if(!reportsData||allDates.length===0)return;var r=reportsData.reports[allDates[0]];if(!r)return;var d=document.getElementById('hubDescIdioms');if(d)d.textContent='每日积累 · '+(r.idioms||[]).length+'个';d=document.getElementById('hubDescVocab');if(d)d.textContent='言语理解 · '+(r.vocab||[]).length+'组';d=document.getElementById('hubDescKnowledge');if(d)d.textContent='百科知识 · '+(r.knowledge||[]).length+'条';d=document.getElementById('hubDescPolitics');if(d)d.textContent='紧跟热点 · '+((r.politics||[]).length||0)+'条';}

function switchView(from,to){from.classList.remove('view-visible');from.setAttribute('aria-hidden','true');to.classList.add('view-visible');to.setAttribute('aria-hidden','false');setTimeout(function(){to.scrollTop=0;if(to.focus)to.focus();},60);}
function goToHub(){switchView(document.getElementById('landingView'),document.getElementById('hubView'));}
function backToHub(){switchView(document.getElementById('contentView'),document.getElementById('hubView'));}
function goToLanding(){refreshLandingStats();switchView(document.getElementById('hubView'),document.getElementById('landingView'));}
function openContent(cat){currentCategory=cat;displayCount=0;currentIndex=0;currentDate=allDates.length>0?allDates[0]:'';document.getElementById('contentTitle').textContent=CATEGORY_CONFIG[cat].title;renderCategoryContent();saveState();switchView(document.getElementById('hubView'),document.getElementById('contentView'));}

function refreshLandingStats(){
  document.getElementById('landingStreak').textContent='已坚持 '+computeStreak()+' 天';
  document.getElementById('landingDate').textContent=allDates.length>0?reportsData.reports[allDates[0]].date:'—';
  document.getElementById('landingQuote').textContent=pickQuote();
}

function getCurrentItems(){
  var report=currentDate?reportsData.reports[currentDate]:null;
  if(!report)return[];
  if(currentCategory==='idioms')return report.idioms||[];
  if(currentCategory==='vocab')return report.vocab||[];
  if(currentCategory==='politics')return report.politics||[];
  return report.knowledge||[];
}

function renderCategoryContent(){
  var cfg=CATEGORY_CONFIG[currentCategory];
  document.getElementById('topbarDate').textContent=currentDate?reportsData.reports[currentDate].date:'—';
  populateSelect();
  var allItems=getCurrentItems();
  var total=allItems.length;
  var html='';

  function buildCounts(total){
    var a=COUNT_OPTIONS.filter(function(n){return n<total;});
    a.push(0);
    return a.filter(function(v,i,s){return s.indexOf(v)===i;});
  }

  function pillsHTML(counts){
    var labels={3:'3个',5:'5个',10:'10个',0:'全部'};
    var h='<div class="count-selector">';
    counts.forEach(function(c){
      h+='<button class="count-pill'+(c===displayCount?' active':'')+'" onclick="setCount('+c+')">'+labels[c]+'</button>';
    });
    h+='</div>';
    return h;
  }

  // --- Empty ---
  if(total===0){
    html+='<div class="empty-state">';
    html+='<span class="empty-icon">'+cfg.emptyIcon+'</span>';
    html+='<div class="empty-text">'+cfg.emptyText+'</div>';
    html+='<div class="empty-hint">'+cfg.emptyHint+'</div>';
    html+='</div>';
    document.getElementById('content').innerHTML=html;
    var cv=document.getElementById('contentView');if(cv)cv.scrollTop=0;
    return;
  }

  var counts=buildCounts(total);
  if(displayCount===0||displayCount>total)displayCount=0;
  var items=displayCount===0?allItems:allItems.slice(0,displayCount);
  var actualTotal=items.length;

  // Clamp index
  if(currentIndex>=actualTotal)currentIndex=actualTotal-1;
  if(currentIndex<0)currentIndex=0;

  var isIdiom=currentCategory==='idioms';
  var isVocab=currentCategory==='vocab';
  var unit=isIdiom?'个':'条';
  var sectionLabel=isIdiom?'Idioms':(isVocab?'Vocab':'Knowledge');

  html+='<section class="section">';
  html+='<div class="section-label">'+sectionLabel+'</div>';
  html+='<div class="section-header">';
  html+='<h2 class="section-title">'+cfg.title+' <span class="count">'+actualTotal+'/'+total+unit+'</span></h2>';
  html+=pillsHTML(counts);
  html+='</div>';

  // --- Flashcard ---
  if(currentIndex<actualTotal){
    var item=items[currentIndex];
    html+='<div class="flashcard-wrap">';
    html+='<div class="flashcard-progress">第 '+(currentIndex+1)+'/'+actualTotal+unit+'</div>';
    html+='<div class="flashcard">';
    if(isIdiom){
      html+='<div class="fc-idiom-word">'+esc(item.idiom)+'</div>';
      html+='<div class="fc-idiom-explain">'+esc(item.explanation||'')+'</div>';
      if(item.focus)html+='<div class="fc-idiom-focus">'+esc(item.focus)+'</div>';
    } else {
      html+='<div class="fc-k-tag">'+esc(item.category)+'</div>';
      html+='<div class="fc-k-title">'+esc(item.title)+'</div>';
      html+='<div class="fc-k-body">'+esc(item.body)+'</div>';
      if(item.exam_point)html+='<div class="fc-exam-point">'+esc(item.exam_point)+'</div>';
    }
    html+='</div>';

    // Navigation
    html+='<div class="flashcard-nav">';
    html+='<button class="fc-nav-btn" onclick="prevCard()"'+(currentIndex===0?' disabled':'')+'>← 上一个</button>';
    if(currentIndex<actualTotal-1){
      html+='<button class="fc-nav-btn fc-nav-primary" onclick="nextCard()">记住了 →</button>';
    } else {
      html+='<button class="fc-nav-btn fc-nav-primary" onclick="finishSession()">✓ 完成</button>';
    }
    html+='</div>';
    html+='</div>';
  } else {
    // Completion
    html+='<div class="flashcard-done">';
    html+='<span class="fc-done-icon">✓</span>';
    html+='<div class="fc-done-text">全部完成</div>';
    html+='<div class="fc-done-hint">今天又进步了一点</div>';
    html+='<button class="fc-nav-btn fc-nav-primary" style="margin-top:28px" onclick="currentIndex=0;renderCategoryContent();">再来一遍</button>';
    html+='</div>';
  }

  html+='</section>';

  document.getElementById('content').innerHTML=html;
  var cv=document.getElementById('contentView');if(cv)cv.scrollTop=0;
  // Update bottom nav disabled states
  var idx=allDates.indexOf(currentDate);
  var prevBtn=document.querySelector('button[onclick*="prevDay"]');
  var nextBtn=document.querySelector('button[onclick*="nextDay"]');
  if(prevBtn)prevBtn.disabled=idx>=allDates.length-1;
  if(nextBtn)nextBtn.disabled=idx<=0;
}

function nextCard(){currentIndex++;renderCategoryContent();saveState();}
function prevCard(){if(currentIndex>0){currentIndex--;renderCategoryContent();saveState();}}
function finishSession(){var items=getCurrentItems();var n=displayCount===0?items.length:Math.min(displayCount,items.length);currentIndex=n;renderCategoryContent();saveState();}

function setCount(n){displayCount=n;currentIndex=0;renderCategoryContent();saveState();}

function populateSelect(){
  var sel=document.getElementById('dateSelect');
  if(!sel)return;
  sel.innerHTML=allDates.map(function(d){return '<option value="'+d+'"'+(d===currentDate?' selected':'')+'>'+d.slice(5)+'</option>';}).join('');
}

function prevDay(){var i=allDates.indexOf(currentDate);if(i<allDates.length-1){currentDate=allDates[i+1];currentIndex=0;renderCategoryContent();saveState();}}
function nextDay(){var i=allDates.indexOf(currentDate);if(i>0){currentDate=allDates[i-1];currentIndex=0;renderCategoryContent();saveState();}}
function jumpTo(d){currentDate=d;currentIndex=0;renderCategoryContent();saveState();}
function goToday(){if(allDates.length>0){currentDate=allDates[0];currentIndex=0;renderCategoryContent();saveState();}}

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function init(){
  try {
    var today=new Date().toISOString().slice(0,10);
    var resp=await fetch('data.json?v='+today+'-v15');
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    reportsData=await resp.json();
    allDates=Object.keys(reportsData.reports).sort().reverse();
    if(allDates.length>0)currentDate=allDates[0];

    // Restore saved state
    var saved=loadState();
    if(saved&&saved.d&&allDates.indexOf(saved.d)>=0){
      currentDate=saved.d;
      if(saved.c)currentCategory=saved.c;
      if(typeof saved.n==='number')displayCount=saved.n;
      if(typeof saved.i==='number')currentIndex=saved.i;
    }

    refreshLandingStats();
    updateHubCounts();
    populateSelect();
    renderCategoryContent();
  } catch(err) {
    console.error('加载失败:',err);
    document.getElementById('landingStreak').textContent='加载失败，请刷新重试';
    var btn=document.querySelector('.landing-btn');
    if(btn){btn.textContent='重新加载';btn.onclick=function(){location.reload();};}
  }
}

// Keyboard support: hub cards + flashcard arrows
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&e.target.classList.contains('hub-card')){
    e.target.click();
    return;
  }
  var cv=document.getElementById('contentView');
  if(cv&&cv.classList.contains('view-visible')){
    if(e.key==='ArrowRight'){e.preventDefault();nextCard();}
    else if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
  }
});

// Touch swipe support for flashcard navigation
document.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchStartTime=Date.now();},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  var dt=Date.now()-touchStartTime;
  if(dt<50)return;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>60){
    var cv=document.getElementById('contentView');
    if(cv&&cv.classList.contains('view-visible')){
      if(dx<0)nextCard();
      else prevCard();
    }
  }
},{passive:true});

// Service Worker
if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}

init();
</script>
</body>
</html>
